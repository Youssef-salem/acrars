name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: RARS-macos.zip
            target: macos
          - os: windows-latest
            artifact: RARS-windows.msi
            target: windows
          - os: ubuntu-latest
            artifact: RARS-linux.deb
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # --- macOS ---
      - name: Build rars.jar (macOS/Linux)
        if: matrix.target != 'windows'
        run: bash build-jar.sh

      - name: Build RARS.app and zip it (macOS)
        if: matrix.target == 'macos'
        run: |
          bash build-app.sh
          cd dist && zip -r ../RARS-macos.zip RARS.app

      # --- Linux ---
      - name: Build RARS.deb (Linux)
        if: matrix.target == 'linux'
        run: |
          mkdir -p build/jpackage-input
          cp rars.jar build/jpackage-input/
          jpackage \
            --type deb \
            --name rars \
            --app-version 1.6 \
            --vendor "RARS (accessible build)" \
            --description "RISC-V Assembler and Runtime Simulator (accessible build)" \
            --input build/jpackage-input \
            --main-jar rars.jar \
            --main-class rars.Launch \
            --java-options "-Drars.accessibility=true" \
            --linux-shortcut \
            --dest dist
          mv dist/*.deb RARS-linux.deb

      # --- Windows ---
      - name: Build rars.jar (Windows)
        if: matrix.target == 'windows'
        shell: cmd
        run: build-jar.bat

      - name: Install WiX Toolset (Windows)
        if: matrix.target == 'windows'
        run: |
          choco install wixtoolset -y --no-progress
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH

      - name: Build RARS.msi (Windows)
        if: matrix.target == 'windows'
        shell: cmd
        run: |
          mkdir build\jpackage-input
          copy rars.jar build\jpackage-input\
          jpackage ^
            --type msi ^
            --name RARS ^
            --app-version 1.6 ^
            --vendor "RARS (accessible build)" ^
            --description "RISC-V Assembler and Runtime Simulator (accessible build)" ^
            --input build\jpackage-input ^
            --main-jar rars.jar ^
            --main-class rars.Launch ^
            --java-options "-Drars.accessibility=true" ^
            --win-shortcut ^
            --win-menu ^
            --win-dir-chooser ^
            --dest dist
          move dist\*.msi RARS-windows.msi

      # --- Always also publish the bare rars.jar ---
      - name: Stage rars.jar
        if: matrix.target == 'macos'
        run: cp rars.jar RARS-rars.jar

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        if: matrix.target == 'macos'
        with:
          name: rars.jar
          path: RARS-rars.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/RARS-macos.zip
            artifacts/RARS-windows.msi
            artifacts/RARS-linux.deb
            artifacts/RARS-rars.jar
          generate_release_notes: true
